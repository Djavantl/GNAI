services:
  app:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: gnai_app
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - .:/var/www
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./docker/php/opcache.dev.ini:/usr/local/etc/php/conf.d/opcache.ini
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
      - RUN_MIGRATIONS=true
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M

  scheduler:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: gnai_scheduler
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
      - RUN_MIGRATIONS=false
    command: php artisan schedule:work
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: gnai_db
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.dev.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma_laravel
    restart: "no"
    profiles:
      - tools
    depends_on:
      - db
    environment:
      - TZ=America/Sao_Paulo
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "8081:80"

  nginx:
    image: nginx:alpine
    container_name: gnai_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - app
    environment:
      - TZ=America/Sao_Paulo
    deploy:
      resources:
        limits:
          memory: 64M

  node:
    image: node:20-alpine
    container_name: gnai_node
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules:/var/www/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - .env.dev
    environment:
      - TZ=America/Sao_Paulo
    command: sh -c "npm install && npm run dev -- --host"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  dbdata:
  node_modules:
