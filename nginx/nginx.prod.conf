# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name seudominio.com www.seudominio.com;

    # Necessário para renovação do certificado Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name seudominio.com www.seudominio.com;

    index index.php index.html;
    root /var/www/public;
    client_max_body_size 64M;

    # ==============================
    # SSL (Let's Encrypt)
    # ==============================
    ssl_certificate     /etc/letsencrypt/live/seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ==============================
    # Segurança
    # ==============================
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Esconde versão do Nginx
    server_tokens off;

    # ==============================
    # Gzip
    # ==============================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ==============================
    # Cache de assets estáticos
    # ==============================
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|webp|avif|woff2|woff|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Assets do Vite (hash no nome = cache agressivo)
    location /build/ {
        expires max;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ==============================
    # Rotas Laravel
    # ==============================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Timeouts mais generosos em prod
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ==============================
    # Bloqueios de segurança
    # ==============================
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    # Bloqueia acesso direto a arquivos sensíveis
    location ~* \.(sql|log|sh|bak)$ {
        deny all;
    }
}
