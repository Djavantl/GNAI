services:
  app:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: gnai_app
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - .:/var/www
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./docker/php/opcache.prod.ini:/usr/local/etc/php/conf.d/opcache.ini
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - TZ=America/Sao_Paulo
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
    command: sh -c "php artisan storage:link --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php-fpm"
    deploy:
      resources:
        limits:
          memory: 512M

  scheduler:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: gnai_scheduler
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - TZ=America/Sao_Paulo
      - REDIS_HOST=redis
    command: php artisan schedule:work
    deploy:
      resources:
        limits:
          memory: 128M

  queue:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: gnai_queue
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - TZ=America/Sao_Paulo
      - REDIS_HOST=redis
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: mysql:8.0
    container_name: gnai_db
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.prod.cnf:/etc/mysql/conf.d/my.cnf
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: gnai_redis
    restart: unless-stopped
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: gnai_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    environment:
      - TZ=America/Sao_Paulo
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  dbdata:
